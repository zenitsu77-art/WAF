services:
  mail:
    image: ghcr.io/egos-tech/smtp:1.1.3
    restart: always

  redis:
    image: valkey/valkey:7.2
    restart: always
    command: >
      sh -c "exec valkey-server --requirepass ${REDIS_PASSWORD}"
    volumes:
      - cache_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 5


  # ---------- FIX ----------
  misp-modules:
    image: ghcr.io/misp/misp-docker/misp-modules:latest
    restart: always
    healthcheck:
      disable: true
  # -------------------------


  misp-core:
    image: ghcr.io/misp/misp-docker/misp-core:latest
    restart: always

    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      misp-modules:
        condition: service_started   # <- changed from service_healthy

    ports:
      - "8081:80"
      - "8443:443"

    volumes:
      - ./configs:/var/www/MISP/app/Config
      - ./logs:/var/www/MISP/app/tmp/logs
      - ./files:/var/www/MISP/app/files
      - ./ssl:/etc/nginx/certs
      - ./gnupg:/var/www/MISP/.gnupg

    environment:
      SUPERVISOR_USERNAME: admin@123
      SUPERVISOR_PASSWORD: admin

      BASE_URL: ${BASE_URL}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_ORG: ${ADMIN_ORG}

      MYSQL_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      ENABLE_DB_SETTINGS: "true"
      DISABLE_SSL_REDIRECT: "false"
      DISABLE_IPV6: "true"

    healthcheck:
      test: ["CMD", "curl", "-ks", "https://localhost/users/heartbeat"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  mysql_data:
  cache_data:
