user www-data;
worker_processes auto;

pid /run/nginx.pid;
error_log /var/log/nginx/error.log info;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /var/log/nginx/access.log;

    # ===============================
    # NAXSI CORE RULES
    # ===============================
    include /etc/nginx/naxsi/naxsi_core.rules;

    # ===============================
    # HTTP → HTTPS
    # ===============================
    server {
        listen 10.10.10.10:80;
        server_name 10.10.10.10;
        return 301 https://10.10.10.10$request_uri;
    }

    # ===============================
    # NAXSI IN FRONT OF MISP
    # ===============================
    server {
        listen 10.10.10.10:443 ssl;
        server_name 10.10.10.10;

        ssl_certificate     /etc/nginx/ssl/waf.crt;
        ssl_certificate_key /etc/nginx/ssl/waf.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location / {
            # ---- NAXSI ----
            SecRulesEnabled;
            DeniedUrl "/RequestDenied";

            LibInjectionSql;
            LibInjectionXss;

            # ---- REVERSE PROXY ----
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location = /RequestDenied {
            internal;
            return 403 "Blocked by NAXSI Web Application Firewall\n";
        }
    }
}
